# YOLOv5 + LSNet-V2 (Transformer Hybrid) Optimized
# Parameters
nc: 80  # number of classes
depth_multiple: 1.0  # model depth multiple
width_multiple: 1.0  # layer channel multiple

#anchors:
#  - [10,13, 16,30, 33,23]  # P3/8
#  - [30,61, 62,45, 59,119]  # P4/16
#  - [116,90, 156,198, 373,326]  # P5/32


anchors:
  - [ 16, 21, 18, 24, 21, 21 ]
  - [ 22, 26, 24, 31, 26, 22 ]
  - [ 30, 28, 36, 33, 40, 43 ]

# LSNet-V2 backbone
backbone:
  # [from, number, module, args]
  # Layer 0: 主干网络
  [[ -1, 1, LSNetBackbone, [ 't' ] ], # args: 't'(tiny), 's'(small), 'b'(base)

   # Layer 1-3: 特征分层提取 (IndexSelect)
   # 假设 LSNetBackbone 返回一个包含 [P3, P4, P5] tensor 的列表
   [ -1, 1, IndexSelect, [ 0 ] ], # Layer 1: P3 (Stride 8)
   [ -2, 1, IndexSelect, [ 1 ] ], # Layer 2: P4 (Stride 16)
   [ -3, 1, IndexSelect, [ 2 ] ], # Layer 3: P5 (Stride 32)
  ]

# YOLOv5 Head
head:
  # --- 1. SPP/SPPF 模块 (关键优化) ---
  # 从 Layer 3 (P5) 承接，增加感受野
  [[ -1, 1, SPPF, [ 1024, 5 ] ],  # Layer 4

   # --- 2. FPN (Feature Pyramid Network) 自顶向下 ---
   [ -1, 1, Conv, [ 512, 1, 1 ] ], # Layer 5
   [ -1, 1, nn.Upsample, [ None, 2, 'nearest' ] ], # Layer 6
   [ [ -1, 2 ], 1, Concat, [ 1 ] ],  # Layer 7: cat P4 (Layer 2)
   [ -1, 3, C3, [ 512, False ] ],  # Layer 8

   [ -1, 1, Conv, [ 256, 1, 1 ] ], # Layer 9
   [ -1, 1, nn.Upsample, [ None, 2, 'nearest' ] ], # Layer 10
   [ [ -1, 1 ], 1, Concat, [ 1 ] ],  # Layer 11: cat P3 (Layer 1)
   [ -1, 3, C3, [ 256, False ] ],  # Layer 12 (P3 Output) -> Detect Branch 1

   # --- 3. PAN (Path Aggregation Network) 自底向上 ---
   [ -1, 1, Conv, [ 256, 3, 2 ] ], # Layer 13
   [ [ -1, 8 ], 1, Concat, [ 1 ] ],  # Layer 14: cat FPN P4 (Layer 8)
   [ -1, 3, C3, [ 512, False ] ],  # Layer 15 (P4 Output) -> Detect Branch 2

   [ -1, 1, Conv, [ 512, 3, 2 ] ], # Layer 16
   [ [ -1, 4 ], 1, Concat, [ 1 ] ],  # Layer 17: cat SPPF P5 (Layer 4)

   # --- 4. Transformer Block (关键优化) ---
   # 在最深层使用 C3TR 替代 C3，进一步增强全局注意力
   [ -1, 3, C3TR, [ 1024, False ] ],  # Layer 18 (P5 Output) -> Detect Branch 3

   # --- 5. Detect Head ---
   [ [ 12, 15, 18 ], 1, Detect, [ nc, anchors ] ], # Layer 19
  ]